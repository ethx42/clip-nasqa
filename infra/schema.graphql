schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type Session {
  slug: String!
  title: String!
  isActive: Boolean!
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
}

type Snippet {
  id: String!
  sessionSlug: String!
  type: String!
  content: String!
  language: String
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
}

type Question {
  id: String!
  sessionSlug: String!
  text: String!
  fingerprint: String!
  authorName: String
  upvoteCount: Int!
  downvoteCount: Int!
  isHidden: Boolean!
  isFocused: Boolean!
  isBanned: Boolean!
  reactionCounts: AWSJSON
  reactionOrder: AWSJSON
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
}

type Reply {
  id: String!
  questionId: String!
  sessionSlug: String!
  text: String!
  isHostReply: Boolean!
  fingerprint: String!
  reactionCounts: AWSJSON
  reactionOrder: AWSJSON
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
}

enum ReactionTargetType {
  QUESTION
  REPLY
}

enum SessionEventType {
  SNIPPET_ADDED
  SNIPPET_DELETED
  CLIPBOARD_CLEARED
  QUESTION_ADDED
  QUESTION_UPDATED
  REPLY_ADDED
  PARTICIPANT_BANNED
  REACTION_UPDATED
}

type SessionUpdate {
  eventType: SessionEventType!
  sessionSlug: String!
  payload: AWSJSON!
}

type SessionData {
  snippets: [Snippet!]!
  questions: [Question!]!
  replies: [Reply!]!
}

type Query {
  _empty: String
  getSessionData(sessionSlug: String!): SessionData!
}

type Mutation {
  _stub: SessionUpdate
  pushSnippet(sessionSlug: String!, hostSecretHash: String!, content: String!, type: String!, language: String): SessionUpdate!
  deleteSnippet(sessionSlug: String!, hostSecretHash: String!, snippetId: String!): SessionUpdate!
  clearClipboard(sessionSlug: String!, hostSecretHash: String!): SessionUpdate!
  addQuestion(sessionSlug: String!, text: String!, fingerprint: String!, authorName: String): SessionUpdate!
  upvoteQuestion(sessionSlug: String!, questionId: String!, fingerprint: String!, remove: Boolean): SessionUpdate!
  addReply(sessionSlug: String!, questionId: String!, text: String!, fingerprint: String!, isHostReply: Boolean!, authorName: String): SessionUpdate!
  focusQuestion(sessionSlug: String!, hostSecretHash: String!, questionId: String): SessionUpdate!
  banQuestion(sessionSlug: String!, hostSecretHash: String!, questionId: String!): SessionUpdate!
  banParticipant(sessionSlug: String!, hostSecretHash: String!, fingerprint: String!): SessionUpdate!
  downvoteQuestion(sessionSlug: String!, questionId: String!, fingerprint: String!, remove: Boolean): SessionUpdate!
  restoreQuestion(sessionSlug: String!, hostSecretHash: String!, questionId: String!): SessionUpdate!
  react(sessionSlug: String!, targetId: String!, targetType: ReactionTargetType!, emoji: String!, fingerprint: String!): SessionUpdate!
}

type Subscription {
  onSessionUpdate(sessionSlug: String!): SessionUpdate
    @aws_subscribe(mutations: ["_stub", "pushSnippet", "deleteSnippet", "clearClipboard", "addQuestion", "upvoteQuestion", "addReply", "focusQuestion", "banQuestion", "banParticipant", "downvoteQuestion", "restoreQuestion", "react"])
}

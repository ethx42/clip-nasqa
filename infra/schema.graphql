schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type Session {
  code: String!
  title: String!
  isActive: Boolean!
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
}

type Snippet {
  id: String!
  sessionCode: String!
  type: String!
  content: String!
  language: String
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
  editedAt: AWSTimestamp
}

type Question {
  id: String!
  sessionCode: String!
  text: String!
  fingerprint: String!
  authorName: String
  isHostQuestion: Boolean!
  upvoteCount: Int!
  downvoteCount: Int!
  isHidden: Boolean!
  isFocused: Boolean!
  isBanned: Boolean!
  reactionCounts: AWSJSON
  reactionOrder: AWSJSON
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
  editedAt: AWSTimestamp
}

type Reply {
  id: String!
  questionId: String!
  sessionCode: String!
  text: String!
  isHostReply: Boolean!
  fingerprint: String!
  reactionCounts: AWSJSON
  reactionOrder: AWSJSON
  createdAt: AWSTimestamp!
  TTL: AWSTimestamp!
  editedAt: AWSTimestamp
}

enum ReactionTargetType {
  QUESTION
  REPLY
}

enum SessionEventType {
  SNIPPET_ADDED
  SNIPPET_DELETED
  CLIPBOARD_CLEARED
  QUESTION_ADDED
  QUESTION_UPDATED
  REPLY_ADDED
  PARTICIPANT_BANNED
  REACTION_UPDATED
  QUESTION_EDITED
  QUESTION_DELETED
  REPLY_EDITED
  REPLY_DELETED
  SNIPPET_EDITED
}

type SessionUpdate {
  eventType: SessionEventType!
  sessionCode: String!
  payload: AWSJSON!
}

type SessionData {
  snippets: [Snippet!]!
  questions: [Question!]!
  replies: [Reply!]!
}

type Query {
  _empty: String
  getSessionData(sessionCode: String!): SessionData!
}

type Mutation {
  _stub: SessionUpdate
  pushSnippet(sessionCode: String!, hostSecretHash: String!, content: String!, type: String!, language: String): SessionUpdate!
  deleteSnippet(sessionCode: String!, hostSecretHash: String!, snippetId: String!): SessionUpdate!
  clearClipboard(sessionCode: String!, hostSecretHash: String!): SessionUpdate!
  addQuestion(sessionCode: String!, text: String!, fingerprint: String!, authorName: String, isHostQuestion: Boolean!): SessionUpdate!
  upvoteQuestion(sessionCode: String!, questionId: String!, fingerprint: String!, remove: Boolean): SessionUpdate!
  addReply(sessionCode: String!, questionId: String!, text: String!, fingerprint: String!, isHostReply: Boolean!, authorName: String): SessionUpdate!
  focusQuestion(sessionCode: String!, hostSecretHash: String!, questionId: String): SessionUpdate!
  banQuestion(sessionCode: String!, hostSecretHash: String!, questionId: String!): SessionUpdate!
  banParticipant(sessionCode: String!, hostSecretHash: String!, fingerprint: String!): SessionUpdate!
  downvoteQuestion(sessionCode: String!, questionId: String!, fingerprint: String!, remove: Boolean): SessionUpdate!
  restoreQuestion(sessionCode: String!, hostSecretHash: String!, questionId: String!): SessionUpdate!
  react(sessionCode: String!, targetId: String!, targetType: ReactionTargetType!, emoji: String!, fingerprint: String!): SessionUpdate!
  editQuestion(sessionCode: String!, questionId: String!, text: String!, fingerprint: String, hostSecretHash: String): SessionUpdate!
  deleteQuestion(sessionCode: String!, questionId: String!, fingerprint: String, hostSecretHash: String): SessionUpdate!
  editReply(sessionCode: String!, replyId: String!, text: String!, fingerprint: String, hostSecretHash: String): SessionUpdate!
  deleteReply(sessionCode: String!, replyId: String!, fingerprint: String, hostSecretHash: String): SessionUpdate!
  editSnippet(sessionCode: String!, snippetId: String!, content: String!, language: String, hostSecretHash: String!): SessionUpdate!
}

type Subscription {
  onSessionUpdate(sessionCode: String!): SessionUpdate
    @aws_subscribe(mutations: ["_stub", "pushSnippet", "deleteSnippet", "clearClipboard", "addQuestion", "upvoteQuestion", "addReply", "focusQuestion", "banQuestion", "banParticipant", "downvoteQuestion", "restoreQuestion", "react", "editQuestion", "deleteQuestion", "editReply", "deleteReply", "editSnippet"])
}
